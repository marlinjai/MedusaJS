name: Deploy to VPS with Domain
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  DEPLOYMENT_TIMEOUT: 1800 # 30 minutes timeout for deployment

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          # Create deployment script
          cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "🚀 Starting automated deployment with fixed workflow order..."

          # Navigate to project directory
          cd /home/deploy/medusa/busbasisberlin

          # Manual cleanup first (before pulling new cleanup script)
          echo "🧹 Running initial cleanup..."

          # Stop all running containers
          docker stop $(docker ps -q) 2>/dev/null || true
          docker rm $(docker ps -aq) 2>/dev/null || true

          # Fix permissions and clean git repository
          sudo chown -R deploy:deploy /home/deploy/medusa/busbasisberlin 2>/dev/null || true
          git clean -fd 2>/dev/null || sudo git clean -fd 2>/dev/null || true

          # Pull latest changes
          echo "📥 Pulling latest changes..."
          git fetch origin main
          git reset --hard origin/main

          # Ensure proper ownership after git operations
          sudo chown -R deploy:deploy /home/deploy/medusa/busbasisberlin

          # Now run the comprehensive cleanup script
          echo "🧹 Running comprehensive cleanup..."
          chmod +x ./scripts/cleanup-server.sh
          ./scripts/cleanup-server.sh

          # Export ALL environment variables from GitHub Secrets
          export DOMAIN_NAME="${{ secrets.DOMAIN_NAME }}"
          export SSL_CERT_NAME="${{ secrets.SSL_CERT_NAME }}"
          export SSL_KEY_NAME="${{ secrets.SSL_KEY_NAME }}"
          export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export COOKIE_SECRET="${{ secrets.COOKIE_SECRET }}"
          export RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          export RESEND_FROM_EMAIL="${{ secrets.RESEND_FROM_EMAIL }}"
          export S3_ACCESS_KEY_ID="${{ secrets.S3_ACCESS_KEY_ID }}"
          export S3_SECRET_ACCESS_KEY="${{ secrets.S3_SECRET_ACCESS_KEY }}"
          export S3_REGION="${{ secrets.S3_REGION }}"
          export S3_BUCKET="${{ secrets.S3_BUCKET }}"
          export S3_ENDPOINT="${{ secrets.S3_ENDPOINT }}"
          export S3_FILE_URL="${{ secrets.S3_FILE_URL }}"
          export COMPANY_NAME="${{ secrets.COMPANY_NAME }}"
          export COMPANY_ADDRESS="${{ secrets.COMPANY_ADDRESS }}"
          export COMPANY_POSTAL_CODE="${{ secrets.COMPANY_POSTAL_CODE }}"
          export COMPANY_CITY="${{ secrets.COMPANY_CITY }}"
          export COMPANY_EMAIL="${{ secrets.COMPANY_EMAIL }}"
          export COMPANY_PHONE="${{ secrets.COMPANY_PHONE }}"
          export COMPANY_TAX_ID="${{ secrets.COMPANY_TAX_ID }}"
          export COMPANY_BANK_INFO="${{ secrets.COMPANY_BANK_INFO }}"
          export PDF_FOOTER_TEXT="${{ secrets.PDF_FOOTER_TEXT }}"
          export EMAIL_SIGNATURE="${{ secrets.EMAIL_SIGNATURE }}"
          export EMAIL_FOOTER="${{ secrets.EMAIL_FOOTER }}"

          # Run deployment script
          echo "🎯 Running blue-green deployment..."
          chmod +x ./scripts/deploy-with-domain.sh
          ./scripts/deploy-with-domain.sh

          echo "🎉 Deployment completed successfully!"
          echo "🌐 Application is now running at https://${{ secrets.DOMAIN_NAME }}"
          echo "⚙️ Admin: https://${{ secrets.DOMAIN_NAME }}/app"

          EOF

          # Execute deployment script
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' < deploy.sh

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment completed successfully!"
          else
            echo "❌ Deployment failed!"
          fi
