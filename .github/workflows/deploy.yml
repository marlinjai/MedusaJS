name: Production Blue-Green Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      force_deployment:
        description: 'Force deployment even if no changes detected'
        required: false
        default: false
        type: boolean

env:
  DEPLOYMENT_TIMEOUT: 3600 # 60 minutes timeout for deployment
  SSH_TIMEOUT: 30
  HEALTH_CHECK_TIMEOUT: 300

jobs:
  # Pre-deployment checks
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check_changes.outputs.should_deploy }}
      deployment_id: ${{ steps.generate_id.outputs.deployment_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for relevant changes
        id: check_changes
        run: |
          if [[ "${{ github.event.inputs.force_deployment }}" == "true" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "🔄 Force deployment requested"
            exit 0
          fi

          # Check if there are changes in application code
          if git diff --name-only HEAD~1 HEAD | grep -E '\.(ts|js|tsx|jsx|json|yml|yaml|dockerfile)$|^busbasisberlin/' > /dev/null; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Application changes detected"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No application changes detected"
          fi

      - name: Generate deployment ID
        id: generate_id
        run: |
          DEPLOYMENT_ID="deploy-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA:0:8}"
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "🆔 Deployment ID: $DEPLOYMENT_ID"

  # Main deployment job
  deploy:
    runs-on: ubuntu-latest
    needs: pre-deployment
    if: needs.pre-deployment.outputs.should_deploy == 'true'
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH with enhanced security
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH connection
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Create SSH config for optimized connection
          cat > ~/.ssh/config << EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            Port 22
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
            ServerAliveInterval 60
            ServerAliveCountMax 10
            ConnectTimeout ${{ env.SSH_TIMEOUT }}
            TCPKeepAlive yes
            Compression yes
          EOF

          chmod 600 ~/.ssh/config

          # Add server to known hosts with retry logic
          echo "🔑 Adding server to known hosts..."
          for attempt in {1..5}; do
            if ssh-keyscan -T 10 -p 22 ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "✅ Successfully added server to known hosts (attempt $attempt)"
              break
            else
              echo "⚠️ Attempt $attempt failed, retrying in 5 seconds..."
              sleep 5
            fi

            if [[ $attempt -eq 5 ]]; then
              echo "⚠️ Could not add server to known hosts, proceeding with StrictHostKeyChecking=accept-new"
            fi
          done

          chmod 600 ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          echo "🔍 Testing SSH connection..."
          if ssh vps 'echo "SSH connection successful"'; then
            echo "✅ SSH connection test passed"
          else
            echo "❌ SSH connection test failed"
            exit 1
          fi

      - name: Deploy infrastructure and application
        run: |
          echo "🚀 Starting production deployment..."

          # Create comprehensive deployment script
          cat > deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -euo pipefail

          # Deployment configuration
          DEPLOYMENT_ID="${{ needs.pre-deployment.outputs.deployment_id }}"
          PROJECT_DIR="/home/deploy/medusa/busbasisberlin"

          # Colors for output
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          NC='\033[0m'

          log() { echo -e "${GREEN}[$(date +'%H:%M:%S')] $1${NC}"; }
          warn() { echo -e "${YELLOW}[$(date +'%H:%M:%S')] WARNING: $1${NC}"; }
          error() { echo -e "${RED}[$(date +'%H:%M:%S')] ERROR: $1${NC}"; exit 1; }
          info() { echo -e "${BLUE}[$(date +'%H:%M:%S')] INFO: $1${NC}"; }

          log "🚀 Starting deployment: $DEPLOYMENT_ID"

          # Navigate to project directory
          cd "$PROJECT_DIR" || error "Failed to navigate to project directory"

          # Pull latest changes
          log "📥 Pulling latest changes..."
          git fetch origin
          git reset --hard origin/main

          # Export environment variables
          log "🔧 Setting up environment..."
          export DEPLOYMENT_ID="$DEPLOYMENT_ID"
          export GITHUB_SHA="${{ github.sha }}"
          export DOMAIN_NAME="${{ secrets.DOMAIN_NAME }}"
          export SSL_CERT_NAME="${{ secrets.SSL_CERT_NAME }}"
          export SSL_KEY_NAME="${{ secrets.SSL_KEY_NAME }}"
          export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
          export REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export COOKIE_SECRET="${{ secrets.COOKIE_SECRET }}"
          export RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          export RESEND_FROM_EMAIL="${{ secrets.RESEND_FROM_EMAIL }}"
          export S3_ACCESS_KEY_ID="${{ secrets.S3_ACCESS_KEY_ID }}"
          export S3_SECRET_ACCESS_KEY="${{ secrets.S3_SECRET_ACCESS_KEY }}"
          export S3_REGION="${{ secrets.S3_REGION }}"
          export S3_BUCKET="${{ secrets.S3_BUCKET }}"
          export S3_ENDPOINT="${{ secrets.S3_ENDPOINT }}"
          export S3_FILE_URL="${{ secrets.S3_FILE_URL }}"
          export COMPANY_NAME="${{ secrets.COMPANY_NAME }}"
          export COMPANY_ADDRESS="${{ secrets.COMPANY_ADDRESS }}"
          export COMPANY_POSTAL_CODE="${{ secrets.COMPANY_POSTAL_CODE }}"
          export COMPANY_CITY="${{ secrets.COMPANY_CITY }}"
          export COMPANY_EMAIL="${{ secrets.COMPANY_EMAIL }}"
          export COMPANY_PHONE="${{ secrets.COMPANY_PHONE }}"
          export COMPANY_TAX_ID="${{ secrets.COMPANY_TAX_ID }}"
          export COMPANY_BANK_INFO="${{ secrets.COMPANY_BANK_INFO }}"
          export PDF_FOOTER_TEXT="${{ secrets.PDF_FOOTER_TEXT }}"
          export EMAIL_SIGNATURE="${{ secrets.EMAIL_SIGNATURE }}"
          export EMAIL_FOOTER="${{ secrets.EMAIL_FOOTER }}"

          # Check if infrastructure is running
          log "🏗️ Checking infrastructure status..."
          if ! docker compose -f infrastructure/docker-compose.infrastructure.yml ps | grep -q "Up"; then
            log "🚀 Starting infrastructure services..."
            ./infrastructure/setup-infrastructure.sh
          else
            log "✅ Infrastructure services are running"
          fi

          # Run blue-green deployment
          log "🎯 Running blue-green deployment..."
          ./scripts/deploy-blue-green.sh deploy

          log "🎉 Deployment completed successfully!"
          log "🌐 Application: https://${{ secrets.DOMAIN_NAME }}"
          log "⚙️ Admin: https://${{ secrets.DOMAIN_NAME }}/app"
          log "📊 Portainer: https://portainer.${{ secrets.DOMAIN_NAME }}"
          log "📈 Uptime Kuma: https://uptime.${{ secrets.DOMAIN_NAME }}"

          DEPLOY_SCRIPT

          # Execute deployment with timeout
          timeout ${{ env.DEPLOYMENT_TIMEOUT }} ssh vps 'bash -s' < deploy.sh

      - name: Verify deployment health
        run: |
          echo "🏥 Verifying deployment health..."

          # Test main application
          for attempt in {1..10}; do
            if curl -f -s "https://${{ secrets.DOMAIN_NAME }}/health" > /dev/null; then
              echo "✅ Main application is healthy"
              break
            else
              echo "⏳ Waiting for application to be ready (attempt $attempt/10)..."
              sleep 30
            fi

            if [[ $attempt -eq 10 ]]; then
              echo "❌ Application health check failed"
              exit 1
            fi
          done

          # Test monitoring services
          echo "🔍 Testing monitoring services..."
          curl -f -s "https://portainer.${{ secrets.DOMAIN_NAME }}" > /dev/null && echo "✅ Portainer is accessible" || echo "⚠️ Portainer may not be ready yet"
          curl -f -s "https://uptime.${{ secrets.DOMAIN_NAME }}" > /dev/null && echo "✅ Uptime Kuma is accessible" || echo "⚠️ Uptime Kuma may not be ready yet"

      - name: Deployment summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Deployment ID:** ${{ needs.pre-deployment.outputs.deployment_id }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🌐 Service URLs" >> $GITHUB_STEP_SUMMARY
            echo "- **Main App:** https://${{ secrets.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Admin Panel:** https://${{ secrets.DOMAIN_NAME }}/app" >> $GITHUB_STEP_SUMMARY
            echo "- **Portainer:** https://portainer.${{ secrets.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Uptime Kuma:** https://uptime.${{ secrets.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Deployment ID:** ${{ needs.pre-deployment.outputs.deployment_id }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please check the logs above for error details." >> $GITHUB_STEP_SUMMARY
          fi

  # Skip deployment notification
  skip-deployment:
    runs-on: ubuntu-latest
    needs: pre-deployment
    if: needs.pre-deployment.outputs.should_deploy == 'false'
    steps:
      - name: Skip deployment notification
        run: |
          echo "## ℹ️ Deployment Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No relevant changes detected in application code." >> $GITHUB_STEP_SUMMARY
          echo "Use 'force_deployment: true' to deploy anyway." >> $GITHUB_STEP_SUMMARY
