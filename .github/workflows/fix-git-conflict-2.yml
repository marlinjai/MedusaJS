name: Fix Git Conflict on VPS (GITHUB_SECRETS.md removal)

on:
  workflow_dispatch:

jobs:
  fix-conflict:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Fix Git conflict on VPS (GITHUB_SECRETS.md removal)
        run: |
          # Create fix script
          cat > fix-conflict-2.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🔧 Fixing Git conflict after GITHUB_SECRETS.md history rewrite..."
          
          # Navigate to project directory
          cd /home/deploy/medusa/busbasisberlin
          
          # Reset local branch to match the new remote history
          echo "📥 Resetting local branch to match remote..."
          git fetch origin
          git reset --hard origin/main
          
          echo "✅ Git conflict resolved!"
          echo "🗑️ GITHUB_SECRETS.md has been completely removed from history"
          EOF
          
          # Execute fix script on VPS
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' < fix-conflict-2.sh

      - name: Verify fix
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'cd /home/deploy/medusa/busbasisberlin && git status && echo "Git status is clean!"'
