name: Fix Git Conflict on VPS (Critical Security Cleanup)

on:
  workflow_dispatch:

jobs:
  fix-conflict:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Fix Git conflict on VPS (Critical Security Cleanup)
        run: |
          # Create fix script
          cat > fix-conflict-3.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🔧 CRITICAL: Fixing Git conflict after sensitive file removal..."
          
          # Navigate to project directory
          cd /home/deploy/medusa/busbasisberlin
          
          # Reset local branch to match the new remote history
          echo "📥 Resetting local branch to match remote (security cleanup)..."
          git fetch origin
          git reset --hard origin/main
          
          echo "✅ Git conflict resolved!"
          echo "🔒 Critical sensitive files have been completely removed from history"
          echo "🗑️ .medusa-secrets/.env.production-secrets purged from all commits"
          
          # Verify no sensitive files remain
          echo "🔍 Verifying no sensitive files remain..."
          if git log --oneline --all -- .medusa-secrets/.env.production-secrets | head -1; then
            echo "❌ WARNING: Sensitive file still found in history!"
          else
            echo "✅ Confirmed: No sensitive files in Git history"
          fi
          
          EOF
          
          # Execute fix script on VPS
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' < fix-conflict-3.sh

      - name: Verify fix and security
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'cd /home/deploy/medusa/busbasisberlin && git status && echo "Git status is clean and secure!"'
