# nginx-monitoring.conf
# SSL reverse proxy for monitoring services (Portainer & Uptime Kuma)

events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/monitoring_access.log;
    error_log /var/log/nginx/monitoring_error.log;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Portainer - Container Management
    server {
        listen 443 ssl;
        http2 on;
        server_name portainer.${DOMAIN_NAME};

        ssl_certificate /etc/nginx/ssl/${SSL_CERT_NAME}.pem;
        ssl_certificate_key /etc/nginx/ssl/${SSL_KEY_NAME}.pem;

        # Increase timeouts for container operations
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        location / {
            proxy_pass http://portainer:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support for real-time updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Buffer settings for large responses
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }

    # Uptime Kuma - Service Monitoring
    server {
        listen 443 ssl;
        http2 on;
        server_name status.${DOMAIN_NAME};

        ssl_certificate /etc/nginx/ssl/${SSL_CERT_NAME}.pem;
        ssl_certificate_key /etc/nginx/ssl/${SSL_KEY_NAME}.pem;

        location / {
            proxy_pass http://uptime-kuma:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support for real-time monitoring
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Disable buffering for real-time data
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # HTTP to HTTPS redirects
    server {
        listen 80;
        server_name portainer.${DOMAIN_NAME} status.${DOMAIN_NAME};
        return 301 https://$server_name$request_uri;
    }

    # Default server for unmatched requests
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate /etc/nginx/ssl/${SSL_CERT_NAME}.pem;
        ssl_certificate_key /etc/nginx/ssl/${SSL_KEY_NAME}.pem;

        return 444; # Close connection without response
    }
}
