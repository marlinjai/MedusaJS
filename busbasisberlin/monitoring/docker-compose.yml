# busbasisberlin/monitoring/docker-compose.yml
# Monitoring stack with subdomain SSL access
version: '3.8'
name: busbasisberlin_monitoring

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command: -H unix:///var/run/docker.sock
    restart: unless-stopped
    volumes:
      - monitoring_portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - busbasisberlin_medusa_network # Connect to main app network for nginx access
    healthcheck:
      test: ['CMD', 'curl', '-f', 'https://localhost:9443/api/status']
      interval: 30s
      timeout: 10s
      retries: 3

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - monitoring_uptime_kuma_data:/app/data
    networks:
      - busbasisberlin_medusa_network # Connect to main app network for nginx access
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  monitoring_portainer_data:
  monitoring_uptime_kuma_data:

networks:
  busbasisberlin_medusa_network:
    external: true # Use the existing network from main app
