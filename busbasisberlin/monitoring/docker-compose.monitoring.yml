# busbasisberlin/monitoring/docker-compose.monitoring.yml
# Comprehensive monitoring stack for blue-green deployments

version: '3.8'

services:
  # Portainer - Docker Management UI (ArgoCD-like for Docker)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - '9443:9443'
      - '9000:9000'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - monitoring

  # Uptime Kuma - Service Monitoring & Status Page
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - '3001:3001'
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - monitoring

  # Dozzle - Real-time Docker Logs
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - monitoring

  # Watchtower - Automatic Container Updates (Optional)
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * * # Daily at 4 AM
      - WATCHTOWER_NOTIFICATIONS=slack
    networks:
      - monitoring

  # Nginx Proxy Manager - Reverse Proxy with SSL (Optional)
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '8081:81' # Admin interface
      - '8443:443' # HTTPS proxy
      - '8082:80' # HTTP proxy
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - monitoring

volumes:
  portainer_data:
  uptime_kuma_data:
  npm_data:
  npm_letsencrypt:

networks:
  monitoring:
    driver: bridge
    name: monitoring_network
