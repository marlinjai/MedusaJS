# Monitoring subdomains configuration
server {
    listen 443 ssl http2;
    server_name portainer.basiscamp-berlin.de;
    
    ssl_certificate /etc/nginx/ssl/basiscamp-berlin.de.pem;
    ssl_certificate_key /etc/nginx/ssl/basiscamp-berlin.de-key.pem;
    
    location / {
        proxy_pass http://portainer:9000\;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name status.basiscamp-berlin.de;
    
    ssl_certificate /etc/nginx/ssl/basiscamp-berlin.de.pem;
    ssl_certificate_key /etc/nginx/ssl/basiscamp-berlin.de-key.pem;
    
    location / {
        proxy_pass http://uptime-kuma:3001\;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
