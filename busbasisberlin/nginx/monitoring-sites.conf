# busbasisberlin/nginx/monitoring-sites.conf
# Nginx configuration for monitoring tools with SSL

# Portainer - Docker Management
server {
    listen 80;
    server_name portainer.basiscamp-berlin.de;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name portainer.basiscamp-berlin.de;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/basiscamp-berlin.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/basiscamp-berlin.de/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Proxy to Portainer
    location / {
        proxy_pass http://localhost:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

