# docker-compose.green.yml
# Green deployment configuration
# Uses ports 9002-9003 and green container names

version: '3.8'

services:
  # Medusa Backend Server - Green
  medusa_backend_server_green:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: medusa_backend_server_green
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://medusa:${POSTGRES_PASSWORD}@medusa_postgres:5432/medusa
      REDIS_URL: redis://:${REDIS_PASSWORD:-medusa_redis_pass}@medusa_redis:6379

      # Application Configuration
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}

      # Email Configuration
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}

      # S3 Configuration
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FILE_URL: ${S3_FILE_URL}

      # Company Information
      COMPANY_NAME: ${COMPANY_NAME}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS}
      COMPANY_POSTAL_CODE: ${COMPANY_POSTAL_CODE}
      COMPANY_CITY: ${COMPANY_CITY}
      COMPANY_EMAIL: ${COMPANY_EMAIL}
      COMPANY_PHONE: ${COMPANY_PHONE}
      COMPANY_TAX_ID: ${COMPANY_TAX_ID}
      COMPANY_BANK_INFO: ${COMPANY_BANK_INFO}
      PDF_FOOTER_TEXT: ${PDF_FOOTER_TEXT}
      EMAIL_SIGNATURE: ${EMAIL_SIGNATURE}
      EMAIL_FOOTER: ${EMAIL_FOOTER}

      # Deployment Identification
      DEPLOYMENT_COLOR: green
      DEPLOYMENT_VERSION: ${GITHUB_SHA:-latest}
    ports:
      - '9002:9000'
    volumes:
      - ./tmp:/app/tmp
    networks:
      - medusa_network
    # Infrastructure services run separately - no depends_on needed
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # Medusa Worker - Green
  medusa_worker_green:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: medusa_worker_green
    restart: unless-stopped
    command: ['npm', 'run', 'worker']
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://medusa:${POSTGRES_PASSWORD}@medusa_postgres:5432/medusa
      REDIS_URL: redis://:${REDIS_PASSWORD:-medusa_redis_pass}@medusa_redis:6379

      # Application Configuration
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}

      # Email Configuration
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}

      # S3 Configuration
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FILE_URL: ${S3_FILE_URL}

      # Company Information
      COMPANY_NAME: ${COMPANY_NAME}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS}
      COMPANY_POSTAL_CODE: ${COMPANY_POSTAL_CODE}
      COMPANY_CITY: ${COMPANY_CITY}
      COMPANY_EMAIL: ${COMPANY_EMAIL}
      COMPANY_PHONE: ${COMPANY_PHONE}
      COMPANY_TAX_ID: ${COMPANY_TAX_ID}
      COMPANY_BANK_INFO: ${COMPANY_BANK_INFO}
      PDF_FOOTER_TEXT: ${PDF_FOOTER_TEXT}
      EMAIL_SIGNATURE: ${EMAIL_SIGNATURE}
      EMAIL_FOOTER: ${EMAIL_FOOTER}

      # Deployment Identification
      DEPLOYMENT_COLOR: green
      DEPLOYMENT_VERSION: ${GITHUB_SHA:-latest}
    ports:
      - '9003:9001'
    volumes:
      - ./tmp:/app/tmp
    networks:
      - medusa_network
    # Infrastructure services run separately - no depends_on needed
    healthcheck:
      test: ['CMD', 'ps', 'aux', '|', 'grep', 'worker']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

networks:
  medusa_network:
    external: true
